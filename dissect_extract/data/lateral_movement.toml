[linux.functions.journal]
description = "systemd journal (lateral movement / auth context): {comm} ({exe}) pid {pid} uid {uid} — {message} (unit {systemd_unit})"
timestamp_field = "ts"

[[linux.walkfs]]
walkfs_path = "/etc/ssh"
path_glob = "**/*"
description = "sshd configuration tree: {path}"
timestamp_field = "mtime"

[[linux.walkfs]]
walkfs_path = "/home"
path_substring = "/.ssh/"
path_glob = "**/*"
description = "User .ssh path: {path}"
timestamp_field = "mtime"

