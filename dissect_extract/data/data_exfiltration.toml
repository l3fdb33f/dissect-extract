# Artifacts commonly tied to collection or exfiltration of data (browsers, transfers, clouds).

[[scenario]]
os = "windows"
function = "browser.downloads"
field_contains = { url = "http" }
description = "Browser download record (possible exfil / staging): {path} — {url}"
timestamp_field = "ts_start"

[windows.functions."browser.history"]
description = "Browser history (sites / cloud consoles visited): {title} — {url}"
timestamp_field = "ts"

[windows.functions."browser.downloads"]
description = "Browser download: {path} from {url}"
timestamp_field = "ts_start"

[windows.functions."browser.passwords"]
description = "Browser saved credential (collection risk): {url}"
timestamp_field = "ts_last_used"

[windows.functions.powershell_history]
description = "PowerShell history (may include archive / upload commands): {command}"
timestamp_field = "mtime"

[[windows.walkfs]]
walkfs_path = "C:/Users"
path_substring = "/Downloads/"
path_glob = "**/*"
description = "User Downloads folder object: {path}"
timestamp_field = "mtime"

[linux.functions."browser.history"]
description = "Browser history: {title} — {url}"
timestamp_field = "ts"

[linux.functions."browser.downloads"]
description = "Browser download: {path} from {url}"
timestamp_field = "ts_start"

[linux.functions.commandhistory]
description = "Shell history (curl/wget/scp patterns possible): {command}"
timestamp_field = "ts"

[[linux.walkfs]]
walkfs_path = "/tmp"
path_glob = "**/*"
description = "/tmp object (staging): {path}"
timestamp_field = "mtime"

[macos.functions."browser.history"]
description = "Browser history: {title} — {url}"
timestamp_field = "ts"

[macos.functions."browser.downloads"]
description = "Browser download: {path} from {url}"
timestamp_field = "ts_start"

[macos.functions.commandhistory]
description = "Shell history: {command}"
timestamp_field = "ts"

[unix.functions."browser.history"]
description = "Browser history: {title} — {url}"
timestamp_field = "ts"

[unix.functions."browser.downloads"]
description = "Browser download: {path} from {url}"
timestamp_field = "ts_start"

[bsd.functions."browser.history"]
description = "Browser history: {title} — {url}"
timestamp_field = "ts"
