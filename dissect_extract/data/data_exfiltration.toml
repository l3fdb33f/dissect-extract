# Artifacts tied to collection, staging, or exfiltration of data (not routine browser history/downloads).

[windows.functions."browser.passwords"]
description = "Browser saved credential (collection risk): {url}"
timestamp_field = "ts_last_used"

[windows.functions.powershell_history]
description = "PowerShell history (may include archive / upload commands): {command}"
timestamp_field = "mtime"

[windows.functions.usnjrnl]
description = "NTFS USN Journal with ARCHIVE reason (data staging / collection signal): {path} — {reason}"
timestamp_field = "ts"
field_contains = { reason = "ARCHIVE" }

[windows.functions."sru.network_data"]
description = "SRUM network data (non-zero bytes — possible exfil / transfer): {app} — user {user}, bytes_sent {bytes_sent}, bytes_recvd {bytes_recvd}"
timestamp_field = "ts"
any_field_nonzero = ["bytes_sent", "bytes_recvd"]

[windows.functions."sru.application_timeline"]
description = "SRUM application timeline (non-zero network_bytes_raw — possible network exfil): {app} — user {user}, network_bytes_raw {network_bytes_raw}"
timestamp_field = "ts"
any_field_nonzero = ["network_bytes_raw"]

[[windows.walkfs]]
walkfs_path = "C:/Users"
path_substring = "/Downloads/"
path_glob = "**/*"
description = "User Downloads folder object: {path}"
timestamp_field = "mtime"

[linux.functions.commandhistory]
description = "Shell history (curl/wget/scp patterns possible): {command}"
timestamp_field = "ts"


